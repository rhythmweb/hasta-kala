<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasta Kala</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial, sans-serif;background:#fafafa;}
.w{border:0.5px solid #ddd;border-radius:12px;overflow:hidden;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:10;}
.logo{font-size:20px;font-weight:600;}
.nav-links{display:flex;gap:16px;}
.nav-links a{font-size:13px;color:#555;text-decoration:none;cursor:pointer;}
.nav-links a:hover{color:#000;}

/* HERO */
.hero{padding:60px 20px;text-align:center;background:#fff;}
.hero h1{font-size:36px;margin-bottom:12px;}
.hero p{color:#666;max-width:500px;margin:auto;}

/* SEARCH + FILTER */
.controls{padding:20px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;}
.filter-btn{padding:6px 12px;border:1px solid #ccc;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;}
.filter-btn.active{background:#000;color:#fff;}

/* GRID */
.crafts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;padding:20px;}
.craft-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;}
.craft-card:hover{transform:translateY(-4px);}
.craft-name{font-weight:600;margin-bottom:6px;}
.craft-region{font-size:12px;color:#777;margin-bottom:10px;}
.craft-desc{font-size:13px;color:#555;display:none;}

/* FOOTER */
.footer{padding:20px;text-align:center;font-size:12px;color:#777;border-top:1px solid #eee;}

</style>
</head>
<body>

<div class="w">

<nav class="nav">
  <div class="logo">Hasta Kala</div>
  <div class="nav-links">
    <a onclick="scrollToSection('crafts')">Crafts</a>
    <a onclick="scrollToSection('about')">About</a>
  </div>
</nav>

<section class="hero">
  <h1>India's disappearing crafts</h1>
  <p>Explore endangered crafts, their origins, and why they are vanishing.</p>
</section>

<section class="controls">
  <input type="text" id="search" placeholder="Search crafts..." onkeyup="searchCrafts()">
  <button class="filter-btn active" onclick="filterCrafts('all',this)">All</button>
  <button class="filter-btn" onclick="filterCrafts('textile',this)">Textile</button>
  <button class="filter-btn" onclick="filterCrafts('pottery',this)">Pottery</button>
</section>

<section id="crafts" class="crafts-grid"></section>

<section id="about" style="padding:40px;text-align:center;">
  <h2>About</h2>
  <p>This project highlights endangered crafts of India and aims to create awareness through design.</p>
</section>

<footer class="footer">
  Hasta Kala · Preserving India's hands
</footer>

</div>

<script>
const crafts=[
{name:'Toda Embroidery',cat:'textile',region:'Tamil Nadu',desc:'Traditional embroidery with geometric patterns.'},
{name:'Khurja Pottery',cat:'pottery',region:'Uttar Pradesh',desc:'Ceramic pottery facing industrial competition.'},
{name:'Rogan Art',cat:'other',region:'Gujarat',desc:'Rare fabric painting practiced by few artisans.'}
];

let currentFilter='all';

function render(){
  const grid=document.getElementById('crafts');
  const search=document.getElementById('search').value.toLowerCase();

  grid.innerHTML=crafts
    .filter(c=> (currentFilter==='all'||c.cat===currentFilter) && c.name.toLowerCase().includes(search))
    .map(c=>`
      <div class="craft-card" onclick="toggleDesc(this)">
        <div class="craft-name">${c.name}</div>
        <div class="craft-region">${c.region}</div>
        <div class="craft-desc">${c.desc}</div>
      </div>
    `).join('');
}

function filterCrafts(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function searchCrafts(){render();}

function toggleDesc(el){
  const desc=el.querySelector('.craft-desc');
  desc.style.display=desc.style.display==='block'?'none':'block';
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

render();
</script>

</body>
</html>
